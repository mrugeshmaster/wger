name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      wger-react_ref:
        description: 'Git ref (branch, tag, or SHA) of mrugeshmaster/wger-react to analyze. Defaults to its default branch.'
        required: false
        type: string
      wger-flutter_ref:
        description: 'Git ref (branch, tag, or SHA) of mrugeshmaster/wger-flutter to analyze. Defaults to its default branch.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'skyramp-testbot[bot]' }}

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot') && github.event.comment.user.login != 'skyramp-testbot[bot]')
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Generate GitHub App Token
        id: skyramp-testbot-app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}
          repositories: wger,wger-react,wger-flutter

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          filter: blob:none
          path: wger
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        id: skyramp-checkout-wger-react
        continue-on-error: true
        with:
          repository: mrugeshmaster/wger-react
          path: wger-react
          fetch-depth: 0
          filter: blob:none
          ref: ${{ inputs['wger-react_ref'] || github.head_ref || github.ref_name }}
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps['skyramp-checkout-wger-react'].outcome == 'failure'
        with:
          repository: mrugeshmaster/wger-react
          path: wger-react
          fetch-depth: 0
          filter: blob:none
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        id: skyramp-checkout-wger-flutter
        continue-on-error: true
        with:
          repository: mrugeshmaster/wger-flutter
          path: wger-flutter
          fetch-depth: 0
          filter: blob:none
          ref: ${{ inputs['wger-flutter_ref'] || github.head_ref || github.ref_name }}
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps['skyramp-checkout-wger-flutter'].outcome == 'failure'
        with:
          repository: mrugeshmaster/wger-flutter
          path: wger-flutter
          fetch-depth: 0
          filter: blob:none
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: skyramp/testbot@d73b19920cf3d8df3b3287c8bd95d09fd997a3d1 # v0.10.6
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ steps.skyramp-testbot-app-token.outputs.token }}
          workingDirectory: 'wger'
          targetSetupCommand: 'docker build -t wger/server:pr-build -f ./extras/docker/production/Dockerfile . && docker compose -f ./.skyramp/sut/docker-compose.testbot.yml up -d'
          targetReadyCheckCommand: 'curl -sf http://localhost/api/v2/'
          targetTeardownCommand: 'docker compose -f ./.skyramp/sut/docker-compose.testbot.yml down -v'
          skyrampMcpVersion: '0.2.150-rc.ui.mntnc'
          relatedRepoPaths: |
            ./wger-react
            ./wger-flutter

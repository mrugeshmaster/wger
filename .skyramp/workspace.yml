# Skyramp Workspace Configuration
workspace:
  repoName: mrugeshmaster/wger
  repoUrl: https://github.com/mrugeshmaster/wger
metadata:
  schemaVersion: v1
  executorVersion: v1.3.29
  createdAt: "2026-06-25T19:37:16.797Z"
  updatedAt: "2026-06-25T19:38:03.062Z"
services:
  - serviceName: wger-backend
    language: python
    framework: pytest
    testDirectory: tests/skyramp
    api:
      schemaPath: http://localhost/api/v2/schema/
      authType: token
      authHeader: Authorization
      baseUrl: http://localhost
    runtimeDetails:
      serverStartCommand: docker compose -f .skyramp/sut/docker-compose.testbot.yml up -d web
      runtime: docker
      dockerNetwork: wger_testbot_network
  - serviceName: wger-react-frontend
    repository: mrugeshmaster/wger-react
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/wger-react
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:3000
    runtimeDetails:
      serverStartCommand: npm run start
      runtime: local
  - serviceName: wger-flutter-mobile
    repository: mrugeshmaster/wger-flutter
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/wger-flutter
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:8080
    runtimeDetails:
      runtime: local
